<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数＆読了目安カウント</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f9;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        .result-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #eee;
        }
        .label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }
        .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .unit {
            font-size: 1rem;
            margin-left: 4px;
        }
        .info {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #999;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>読了目安時間シミュレーター</h1>
    
    <textarea id="inputText" placeholder="ここにテキストを入力または貼り付けてください..."></textarea>

    <div class="result-container">
        <div class="card">
            <div class="label">現在の文字数</div>
            <div class="value" id="charCount">0<span class="unit">文字</span></div>
        </div>
        <div class="card">
            <div class="label">読了目安（400字/分）</div>
            <div class="value" id="readTime">0<span class="unit">分 00秒</span></div>
        </div>
    </div>

    <div class="info">※ 空白・改行を含めた文字数で算出しています</div>
</div>

<script>
    const textArea = document.getElementById('inputText');
    const charCountEl = document.getElementById('charCount');
    const readTimeEl = document.getElementById('readTime');

    const SPEED_PER_MIN = 400; // 1分あたりの読書スピード

    textArea.addEventListener('input', () => {
        const text = textArea.value;
        const count = text.length;

        // 文字数の表示更新
        charCountEl.innerHTML = `${count.toLocaleString()}<span class="unit">文字</span>`;

        // 読了時間の計算
        if (count === 0) {
            readTimeEl.innerHTML = `0<span class="unit">分 00秒</span>`;
            return;
        }

        const totalSeconds = Math.ceil((count / SPEED_PER_MIN) * 60);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;

        // 読了時間の表示更新
        readTimeEl.innerHTML = `${minutes}<span class="unit">分 ${seconds.toString().padStart(2, '0')}秒</span>`;
    });
</script>

</body>
</html>
